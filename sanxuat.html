        // Action Handlers for deleting items/SOs (With dynamic selected array shifting)
        function deleteSOProductItem(soId, itemIdx) {
            if (confirm("Bạn có chắc chắn muốn xóa sản phẩm này khỏi đơn đặt hàng không?")) {
                const so = state.salesOrders.find(s => s.id === soId);
                if (so) {
                    // Remove from selections first
                    const key = `${soId}_${itemIdx}`;
                    selectedSalesOrderItems = selectedSalesOrderItems.filter(k => k !== key);
                    
                    // Adjust remaining selected items' itemIdx because splicing mutations shift subsequent indexes
                    const newSelectedKeys = [];
                    selectedSalesOrderItems.forEach(k => {
                        const [sId, iIdx] = k.split('_').map(Number);
                        if (sId === soId) {
                            if (iIdx > itemIdx) {
                                newSelectedKeys.push(`${sId}_${iIdx - 1}`);
                            } else if (iIdx < itemIdx) {
                                newSelectedKeys.push(k);
                            }
                        } else {
                            newSelectedKeys.push(k);
                        }
                    });
                    selectedSalesOrderItems = newSelectedKeys;

                    // Remove the item from items array
                    so.items.splice(itemIdx, 1);
                    
                    // If no items left inside this SO, delete the entire SO
                    if (so.items.length === 0) {
                        state.salesOrders = state.salesOrders.filter(s => s.id !== soId);
                        alert("Đơn hàng không còn sản phẩm nào nên đã tự động xóa hoàn toàn!");
                    } else {
                        // Re-evaluate parent SO status after item deletion
                        const hasPending = so.items.some(it => (it.status || 'Chờ sản xuất') === 'Chờ sản xuất');
                        const hasPlanning = so.items.some(it => (it.status || 'Chờ sản xuất') === 'Đang lập kế hoạch');
                        const hasProduction = so.items.some(it => (it.status || 'Chờ sản xuất') === 'Đang sản xuất');
                        const hasCompleted = so.items.some(it => (it.status || 'Chờ sản xuất') === 'Hoàn thành sản xuất');
                        
                        if (hasProduction || hasCompleted) {
                            so.status = hasPending ? 'Đang sản xuất một phần' : 'Đang sản xuất';
                        } else if (hasPlanning) {
                            so.status = hasPending ? 'Đang lập kế hoạch một phần' : 'Đang lập kế hoạch';
                        } else {
                            so.status = 'Chờ sản xuất';
                        }
                        alert("Đã xóa sản phẩm khỏi đơn hàng thành công!");
                    }
                    
                    // Update draft selection
                    if (selectedSalesOrderItems.length === 0) {
                        state.draftSOSelection = null;
                        soAdjustmentState = {};
                    } else if (state.draftSOSelection) {
                        state.draftSOSelection.selected_items = [...selectedSalesOrderItems];
                        const remainingAgg = getSOAggregatedItems();
                        const newAdjustments = {};
                        Object.keys(soAdjustmentState).forEach(prodId => {
                            if (remainingAgg[prodId]) {
                                newAdjustments[prodId] = soAdjustmentState[prodId];
                            }
                        });
                        state.draftSOSelection.adjustments = newAdjustments;
                        soAdjustmentState = newAdjustments;
                    }
                    
                    saveState();
                    renderCurrentTab();
                }
            }
        }

        function deleteEntireSalesOrder(soId) {
            if (confirm("Bạn có chắc chắn muốn xóa TOÀN BỘ đơn đặt hàng này không?")) {
                // Remove all items belonging to this SO from selection
                selectedSalesOrderItems = selectedSalesOrderItems.filter(k => !k.startsWith(`${soId}_`));
                
                state.salesOrders = state.salesOrders.filter(s => s.id !== soId);
                
                // Update draft selection
                if (selectedSalesOrderItems.length === 0) {
                    state.draftSOSelection = null;
                    soAdjustmentState = {};
                } else if (state.draftSOSelection) {
                    state.draftSOSelection.selected_items = [...selectedSalesOrderItems];
                    const remainingAgg = getSOAggregatedItems();
                    const newAdjustments = {};
                    Object.keys(soAdjustmentState).forEach(prodId => {
                        if (remainingAgg[prodId]) {
                            newAdjustments[prodId] = soAdjustmentState[prodId];
                        }
                    });
                    state.draftSOSelection.adjustments = newAdjustments;
                    soAdjustmentState = newAdjustments;
                }
                
                saveState();
                renderCurrentTab();
            }
        }

        function toggleSelectSO(soId, itemIdx, isChecked) {
            const key = `${soId}_${itemIdx}`;
            if (isChecked) {
                if (!selectedSalesOrderItems.includes(key)) selectedSalesOrderItems.push(key);
            } else {
                if (state.draftSOSelection && state.draftSOSelection.selected_items.includes(key)) {
                    deselectSOItemInPlanning(soId, itemIdx);
                    return;
                }
                selectedSalesOrderItems = selectedSalesOrderItems.filter(k => k !== key);
            }
            renderSalesOrders(document.getElementById('content-area'));
        }

        function toggleSelectAllSO(isChecked) {
            const draftKeys = state.draftSOSelection ? state.draftSOSelection.selected_items : [];
            if (isChecked) {
                const newKeys = [];
                state.salesOrders.forEach(so => {
                    so.items.forEach((item, itemIdx) => {
                        const itemStatus = item.status || 'Chờ sản xuất';
                        if (itemStatus === 'Chờ sản xuất') {
                            newKeys.push(`${so.id}_${itemIdx}`);
                        }
                    });
                });
                selectedSalesOrderItems = Array.from(new Set([...newKeys, ...draftKeys]));
            } else {
                selectedSalesOrderItems = [...draftKeys];
            }
            renderSalesOrders(document.getElementById('content-area'));
        }

        function toggleSelectEntireSO(soId, isChecked) {
            const so = state.salesOrders.find(s => s.id === soId);
            if (!so) return;
            
            so.items.forEach((item, itemIdx) => {
                const itemStatus = item.status || 'Chờ sản xuất';
                if (itemStatus === 'Chờ sản xuất' || (state.draftSOSelection && itemStatus === 'Đang lập kế hoạch')) {
                    const key = `${soId}_${itemIdx}`;
                    if (isChecked) {
                        if (!selectedSalesOrderItems.includes(key)) selectedSalesOrderItems.push(key);
                    } else {
                        if (state.draftSOSelection && state.draftSOSelection.selected_items.includes(key)) {
                            deselectSOItemInPlanning(soId, itemIdx, false);
                        } else {
                            selectedSalesOrderItems = selectedSalesOrderItems.filter(k => k !== key);
                        }
                    }
                }
            });
            renderSalesOrders(document.getElementById('content-area'));
        }

        // --- DYNAMIC ITEM-LEVEL PLANNING & AGGREGATION HANDLERS ---
        function getSOAggregatedItems() {
            const aggregated = {};
            selectedSalesOrderItems.forEach(key => {
                const [soId, itemIdx] = key.split('_').map(Number);
                const so = state.salesOrders.find(s => s.id === soId);
                if (so && so.items[itemIdx]) {
                    const item = so.items[itemIdx];
                    if (aggregated[item.product_id]) {
                        aggregated[item.product_id] += item.qty;
                    } else {
                        aggregated[item.product_id] = item.qty;
                    }
                }
            });
            return aggregated;
        }

                        due_date: so.due_date,

                        soAdjustmentState[prodId] = {
                            qty: state.draftSOSelection.adjustments[prodId].qty,
                            unit: state.draftSOSelection.adjustments[prodId].unit

                            qty: defaultQty,
                            unit: defaultUnit

                    }
                }

            // Clean up obsolete keys
            Object.keys(soAdjustmentState).forEach(prodIdStr => {
                const prodId = parseInt(prodIdStr);

                    delete soAdjustmentState[prodId];

            let html = `
                <div class="card fade-in" style="border: 2px solid var(--primary); background: linear-gradient(180deg, var(--bg-card) 0%, rgba(37,99,235,0.01) 100%); margin-top: 2rem; box-shadow: 0 12px 30px rgba(37,99,235,0.06); border-radius: 16px;">

                                    : `<span class="badge badge-warning" style="font-weight:600;"><i data-lucide="edit" style="width:12px;height:12px;margin-right:4px;"></i> THỰC THỜI (DRAFT)</span> Điều chỉnh sản lượng & đơn vị sản xuất trực tiếp trước khi tạo lệnh.`}

        function updateSOAdjustmentQty(productId, qty) {
            if (!soAdjustmentState[productId]) soAdjustmentState[productId] = {};
            soAdjustmentState[productId].qty = parseFloat(qty) || 0;
            
            if (state.draftSOSelection) {
                if (!state.draftSOSelection.adjustments) state.draftSOSelection.adjustments = {};
                state.draftSOSelection.adjustments[productId] = {
                    qty: soAdjustmentState[productId].qty,
                    unit: soAdjustmentState[productId].unit
                };
                saveState();
            }
        }

        function updateSOAdjustmentUnit(productId, unit) {
            if (!soAdjustmentState[productId]) soAdjustmentState[productId] = {};
            soAdjustmentState[productId].unit = unit;
            
            if (state.draftSOSelection) {
                if (!state.draftSOSelection.adjustments) state.draftSOSelection.adjustments = {};
                state.draftSOSelection.adjustments[productId] = {
                    qty: soAdjustmentState[productId].qty,
                    unit: soAdjustmentState[productId].unit
                };
                saveState();
            }
        }

        function saveSODraft() {
            if (selectedSalesOrderItems.length === 0) {
                alert("Vui lòng chọn ít nhất 1 dòng sản phẩm để lưu kế hoạch nháp!");
                return;
            }
            
            // Lock selected items status
            selectedSalesOrderItems.forEach(key => {
                const [soId, itemIdx] = key.split('_').map(Number);
                const so = state.salesOrders.find(s => s.id === soId);
                if (so && so.items[itemIdx]) {
                    so.items[itemIdx].status = 'Đang lập kế hoạch';
                }
            });

            // Update parent SO statuses based on items
            state.salesOrders.forEach(so => {
                const hasPending = so.items.some(it => (it.status || 'Chờ sản xuất') === 'Chờ sản xuất');
                const hasPlanning = so.items.some(it => (it.status || 'Chờ sản xuất') === 'Đang lập kế hoạch');
                if (hasPlanning && !hasPending) {
                    so.status = 'Đang lập kế hoạch';
                } else if (hasPlanning && hasPending) {
                    so.status = 'Đang lập kế hoạch một phần';
                }
            });
            
            state.draftSOSelection = {
                selected_items: [...selectedSalesOrderItems],
                adjustments: JSON.parse(JSON.stringify(soAdjustmentState))
            };
            
            saveState();
            renderCurrentTab();
            alert("Đã lưu kế hoạch sản xuất nháp thành công! Các sản phẩm được chọn đã được khóa.");
        }

        function deselectSOItemInPlanning(soId, itemIdx, confirmAlert = true) {
            const proceed = !confirmAlert || confirm("Bạn có chắc chắn muốn hủy kế hoạch cho sản phẩm này của đơn hàng không?");
            if (proceed) {
                // Restore item status
                const so = state.salesOrders.find(s => s.id === soId);
                if (so && so.items[itemIdx]) {
                    so.items[itemIdx].status = 'Chờ sản xuất';
                    
                    // Re-evaluate parent SO status
                    const hasPending = so.items.some(it => (it.status || 'Chờ sản xuất') === 'Chờ sản xuất');
                    const hasPlanning = so.items.some(it => (it.status || 'Chờ sản xuất') === 'Đang lập kế hoạch');
                    const hasProduction = so.items.some(it => (it.status || 'Chờ sản xuất') === 'Đang sản xuất');
                    
                    if (!hasPlanning && !hasProduction) {
                        so.status = 'Chờ sản xuất';
                    } else if (hasProduction) {
                        so.status = hasPending ? 'Đang sản xuất một phần' : 'Đang sản xuất';
                    } else {
                        so.status = hasPending ? 'Đang lập kế hoạch một phần' : 'Đang lập kế hoạch';
                    }
                }
                
                const key = `${soId}_${itemIdx}`;
                selectedSalesOrderItems = selectedSalesOrderItems.filter(k => k !== key);
                
                if (selectedSalesOrderItems.length === 0) {
                    state.draftSOSelection = null;
                    soAdjustmentState = {};
                } else if (state.draftSOSelection) {
                    state.draftSOSelection.selected_items = [...selectedSalesOrderItems];
                    
                    const remainingAgg = {};
                    selectedSalesOrderItems.forEach(k => {
                        const [sId, iIdx] = k.split('_').map(Number);
                        const sOrder = state.salesOrders.find(s => s.id === sId);
                        if (sOrder && sOrder.items[iIdx]) {
                            remainingAgg[sOrder.items[iIdx].product_id] = true;
                        }
                    });
                    
                    const newAdjustments = {};
                    Object.keys(soAdjustmentState).forEach(prodId => {
                        if (remainingAgg[prodId]) {
                            newAdjustments[prodId] = soAdjustmentState[prodId];
                        }
                    });
                    state.draftSOSelection.adjustments = newAdjustments;
                    soAdjustmentState = newAdjustments;
                }
                
                saveState();
                renderCurrentTab();
                if (confirmAlert) alert("Đã hủy kế hoạch cho dòng sản phẩm thành công!");
            }
        }

        function createMOFromSOSelection() {
            if (selectedSalesOrderItems.length === 0) {
                alert("Chưa chọn dòng sản phẩm nào!");
                return;
            }
            
            if (confirm("Xác nhận tạo Lệnh sản xuất (MO) cho các sản phẩm đã chọn? Các sản phẩm này sẽ chuyển sang trạng thái Đang sản xuất và được lọc ẩn khỏi danh sách chờ.")) {
                // Safely clean up adjustments to match current selections exactly
                const aggregated = getSOAggregatedItems();
                const activeProdIds = Object.keys(aggregated).map(Number);
                
                Object.keys(soAdjustmentState).forEach(prodIdStr => {
                    const prodId = parseInt(prodIdStr);
                    if (!activeProdIds.includes(prodId)) {
                        delete soAdjustmentState[prodId];
                    }
                });
                activeProdIds.forEach(prodId => {
                    if (!soAdjustmentState[prodId]) {
                        const prod = getProduct(prodId);
                        soAdjustmentState[prodId] = {
                            qty: aggregated[prodId],
                            unit: prod ? prod.unit : 'kg'
                        };
                    }
                });

                const selectedSOIds = Array.from(new Set(selectedSalesOrderItems.map(k => k.split('_')[0]).map(Number)));
                const selectedSOs = state.salesOrders.filter(so => selectedSOIds.includes(so.id));
                
                // 1. Create Production Request (PR)
                const prId = Date.now();
                const prNumber = 'PR-2026-' + Date.now().toString().slice(-4);
                const pr = {
                    id: prId,
                    number: prNumber,
                    so_numbers: selectedSOs.map(s => s.number),
                    created_at: new Date().toISOString()
                };
                state.productionRequests.push(pr);
                
                // 2. Create Production Order (MO) for each aggregated item based on custom adjustments
                let moCount = 1;
                Object.keys(soAdjustmentState).forEach(prodIdStr => {
                    const prodId = parseInt(prodIdStr);
                    const adj = soAdjustmentState[prodId];
                    const bom = getBOMForProduct(prodId);
                    
                    const mo = {
                        id: Date.now() + moCount,
                        req_id: prId,
                        number: `MO-2026-${Date.now().toString().slice(-4)}-${moCount}`,
                        product_id: prodId,
                        bom_id: bom ? bom.id : null,
                        qty: adj.qty,
                        unit: adj.unit,
                        status: 'Draft'
                    };
                    state.productionOrders.push(mo);
                    moCount++;
                });
                
                // 3. Update Selected items status to 'Đang sản xuất'
                selectedSalesOrderItems.forEach(key => {
                    const [soId, itemIdx] = key.split('_').map(Number);
                    const so = state.salesOrders.find(s => s.id === soId);
                    if (so && so.items[itemIdx]) {
                        so.items[itemIdx].status = 'Đang sản xuất';
                    }
                });
                
                // Update parent SO statuses
                state.salesOrders.forEach(so => {
                    const allProduced = so.items.every(it => it.status === 'Đang sản xuất' || it.status === 'Hoàn thành sản xuất');
                    if (allProduced) {
                        so.status = 'Đang sản xuất';
                    } else {
                        const anyProduced = so.items.some(it => it.status === 'Đang sản xuất' || it.status === 'Hoàn thành sản xuất');
                        if (anyProduced) {
                            so.status = 'Đang sản xuất một phần';
                        }
                    }
                });
                
                // 4. Clear selection and draft state
                selectedSalesOrderItems = [];
                state.draftSOSelection = null;
                soAdjustmentState = {};
                
                saveState();
                alert("Đã khởi tạo các Lệnh sản xuất (MO) thành công! Hệ thống tự động chuyển sang Tab Lệnh Sản Xuất.");
                switchTab('production-orders');
            }
        }

        // Save Sales Order (Supports Create & Edit)
        function saveSalesOrder(soId = null) {
            const form = document.getElementById('so-create-form');
            if (!form.reportValidity()) return;

            const customer = document.getElementById('m_so_customer').value;
            const date = document.getElementById('m_so_date').value;
            const dueDate = document.getElementById('m_so_due_date').value;
            const notes = document.getElementById('m_so_notes').value;

            if (soModalItems.length === 0) {
                alert("Đơn hàng phải có nhất 1 sản phẩm!");
                return;
            }

            let valid = true;
            soModalItems.forEach(item => {
                if (!item.product_id) valid = false;
            });

            if (!valid) {
                alert("Vui lòng chọn đầy đủ sản phẩm cho các dòng!");
                return;
            }

            let targetSO = null;
            if (soId !== null) {
                targetSO = state.salesOrders.find(s => s.id === soId);
            }

            const itemsMapped = soModalItems.map(item => {
                let status = 'Chờ sản xuất';
                if (soId !== null && targetSO && targetSO.items) {
                    // Match by product_id to preserve the item planning/production status
                    const oldItem = targetSO.items.find(old => old.product_id === parseInt(item.product_id));
                    if (oldItem) {
                        status = oldItem.status || 'Chờ sản xuất';
                    }
                }
                return {
                    product_id: parseInt(item.product_id),
                    qty: parseFloat(item.qty),
                    unit: item.unit,
                    status: status
                };
            });

            if (soId === null) {
                // Create Mode
                const soCount = state.salesOrders.length + 1;
                const soNumber = `SO-2026-${String(soCount).padStart(4, '0')}`;

                const newSO = {
                    id: Date.now(),
                    number: soNumber,
                    customer,
                    date,
                    due_date: dueDate,
                    notes,
                    status: 'Chờ sản xuất',
                    items: itemsMapped
                };

                state.salesOrders.push(newSO);
            } else {
                // Edit Mode
                if (targetSO) {
                    // 1. Identify which product IDs in this SO were selected before the update
                    const previouslySelectedProducts = [];
                    selectedSalesOrderItems.forEach(key => {
                        const [sId, iIdx] = key.split('_').map(Number);
                        if (sId === soId) {
                            const oldItem = targetSO.items[iIdx];
                            if (oldItem) {
                                previouslySelectedProducts.push(oldItem.product_id);
                            }
                        }
                    });

                    // 2. Clear old selection keys for this SO
                    selectedSalesOrderItems = selectedSalesOrderItems.filter(k => !k.startsWith(`${soId}_`));

                    // 3. Perform the update
                    targetSO.customer = customer;
                    targetSO.date = date;
                    targetSO.due_date = dueDate;
                    targetSO.notes = notes;
                    targetSO.items = itemsMapped;

                    // 4. Map selections back to their new indices
                    const matchedNewIdxs = new Set();
                    previouslySelectedProducts.forEach(prodId => {
                        const newIdx = itemsMapped.findIndex((newItem, nIdx) => 
                            newItem.product_id === prodId && !matchedNewIdxs.has(nIdx)
                        );
                        if (newIdx !== -1) {
                            matchedNewIdxs.add(newIdx);
                            selectedSalesOrderItems.push(`${soId}_${newIdx}`);
                        }
                    });

                    // 5. Re-evaluate the parent SO status
                    const hasPending = targetSO.items.some(it => (it.status || 'Chờ sản xuất') === 'Chờ sản xuất');
                    const hasPlanning = targetSO.items.some(it => (it.status || 'Chờ sản xuất') === 'Đang lập kế hoạch');
                    const hasProduction = targetSO.items.some(it => (it.status || 'Chờ sản xuất') === 'Đang sản xuất');
                    const hasCompleted = targetSO.items.some(it => (it.status || 'Chờ sản xuất') === 'Hoàn thành sản xuất');
                    
                    if (hasProduction || hasCompleted) {
                        targetSO.status = hasPending ? 'Đang sản xuất một phần' : 'Đang sản xuất';
                    } else if (hasPlanning) {
                        targetSO.status = hasPending ? 'Đang lập kế hoạch một phần' : 'Đang lập kế hoạch';
                    } else {
                        targetSO.status = 'Chờ sản xuất';
                    }

                    // 6. Update draft selection adjustments
                    if (state.draftSOSelection) {
                        state.draftSOSelection.selected_items = [...selectedSalesOrderItems];
                        
                        const remainingAgg = getSOAggregatedItems();
                        const newAdjustments = {};
                        Object.keys(soAdjustmentState).forEach(pId => {
                            if (remainingAgg[pId]) {
                                newAdjustments[pId] = soAdjustmentState[pId];
                            }
                        });
                        state.draftSOSelection.adjustments = newAdjustments;
                        soAdjustmentState = newAdjustments;
                    }
                }
            }

            saveState();
            closeModal();
            renderCurrentTab();
        }

        }

        // MO Decompose Logic
        let currentDecomposeMOId = null;
        let selectedDecomposeMethod = 'full'; // 'full' (Mẻ đầy), 'equal' (Mẻ đều)
        let tempBatchSizeOverride = 0;

        function openDecomposeModal(moId) {
            currentDecomposeMOId = moId;
            const mo = state.productionOrders.find(m => m.id === moId);
            const prod = getProduct(mo.product_id);
            const bom = state.boms.find(b => b.id === mo.bom_id);

            tempBatchSizeOverride = bom ? bom.default_batch_qty : 400;

            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            overlay.classList.add('show');

        }

        function renderDecomposeModalContent(mo, prod, bom) {
            // Calculations
            const Q_total = mo.qty;
            const S_batch = tempBatchSizeOverride;

            const totalBatches = Math.ceil(Q_total / S_batch);
            let wosPreview = [];

            if (selectedDecomposeMethod === 'full') {
                // Full batches method
                for (let i = 1; i <= totalBatches; i++) {
                    if (i === totalBatches) {
                        const remaining = Q_total - (totalBatches - 1) * S_batch;
                        wosPreview.push({ index: i, qty: Number(remaining.toFixed(2)) });
                    } else {
                        wosPreview.push({ index: i, qty: S_batch });
                    }
                }
            } else {
                // Equal batches method
                const equalQty = Q_total / totalBatches;

            let modalHtml = `

                                    <th>Quy Trình Các Bước Sẽ Copy</th>

                                        <td><strong style="color:var(--info);">${preview.qty}</strong></td>

                                    </tr>

                    <button class="btn btn-outline" onclick="closeModal()">Đóng</button>
                    <button class="btn btn-success" onclick="confirmDecompose(${mo.id}, ${JSON.stringify(wosPreview).replace(/"/g, '&quot;')})"><i data-lucide="git-merge"></i> Duyệt Tách Mẻ & Tạo Lệnh Công Việc</button>
                </div>
            `;
            const modal = document.getElementById('modal');
            modal.innerHTML = modalHtml;
            lucide.createIcons();
        }

        function changeDecomposeBatchSize(moId, size) {
            tempBatchSizeOverride = size;
            const mo = state.productionOrders.find(m => m.id === moId);
            const prod = getProduct(mo.product_id);
            const bom = state.boms.find(b => b.id === mo.bom_id);

            selectedDecomposeMethod = method;

            const prod = getProduct(mo.product_id);
            const bom = state.boms.find(b => b.id === mo.bom_id);
            renderDecomposeModalContent(mo, prod, bom);
        }

        function confirmDecompose(moId, wosPreviewList) {
            const mo = state.productionOrders.find(m => m.id === moId);
            if (!mo) return;

            const bom = state.boms.find(b => b.id === mo.bom_id);
            const totalSteps = bom ? bom.steps.length : 1;

            // Create actual Work Orders (WO)
            wosPreviewList.forEach(preview => {
                const wo = {
                    id: Date.now() + Math.random(),
                    mo_id: mo.id,
                    number: `WO-${mo.number.slice(-4)}-${preview.index}`,
                    batch_index: preview.index,

                    product_id: mo.product_id,
                    status: 'Draft', // Draft, Material_Allocated, Scheduled, In_Progress, Completed

                    total_steps: totalSteps
                };
                state.workOrders.push(wo);

            // Mark MO as decomposed
            mo.status = 'Decomposed';

        // ==================== TAB 5: WORK ORDERS & MATERIALS PREP ====================
        let selectedWorkOrders = [];

                                    ${state.workOrders.length === 0 ? '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Chưa có Lệnh công việc nào được phân tách. Hãy hoàn tất tách mẻ từ Lệnh MO.</td></tr>' : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- RIGHT COLUMN: DYNAMIC MATERIAL PREPARATION CHECKLIST -->
                    <div class="split-pane">
                        <div class="card-header" style="padding-bottom:10px; margin-bottom: 12px;">

        function toggleSelectWO(woId, isChecked) {

                selectedWorkOrders = selectedWorkOrders.filter(id => id !== woId);
            }
            renderWorkOrders(document.getElementById('content-area'));
        }

        function toggleSelectAllWO(isChecked) {
            if (isChecked) {
                selectedWorkOrders = state.workOrders
                    .filter(w => w.status !== 'Completed' && w.status !== 'In_Progress')
                    .map(w => w.id);
            } else {
                selectedWorkOrders = [];
            }
            renderWorkOrders(document.getElementById('content-area'));
        }

        function renderMaterialAggregation() {
            if (selectedWorkOrders.length === 0) {
                return `
                    <div style="text-align:center; color:var(--text-muted); padding: 5rem 0;">
                        <i data-lucide="info" style="width: 48px; height: 48px; stroke-width: 1; margin-bottom: 1rem; color:var(--border-color);"></i>
                        <p>Vui lòng tích chọn các Lệnh công việc (WO) bên cột trái để hệ thống tính toán nhu cầu vật liệu tự động.</p>
                    </div>
                `;
            }

            // Calculation Algorithm for Aggregating Materials
            const reqMaterials = {};
            let canAllocate = true;

            selectedWorkOrders.forEach(woId => {
                const wo = state.workOrders.find(w => w.id === woId);
                const bom = getBOMForProduct(wo.product_id);
                if (bom) {
                    bom.steps.forEach(step => {
                        step.inputs.forEach(input => {
                            const neededQty = (input.qty / bom.output_qty) * wo.qty;
                            if (reqMaterials[input.product_id]) {
                                reqMaterials[input.product_id] += neededQty;
                            } else {
                                reqMaterials[input.product_id] = neededQty;
                            }
                        });
                    });
                }
            });

            let html = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Vật Tư</th>
                                <th>Tổng Nhu Cầu</th>
                                <th>Khả Dụng Trong Kho</th>
                                <th>Đánh Giá Sẵn Sàng</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${Object.keys(reqMaterials).map(matIdStr => {
                                const matId = parseInt(matIdStr);
                                const mat = getProduct(matId);
                                const totalNeeded = Number(reqMaterials[matId].toFixed(2));
                                const availableStock = mat.stock;
                                const isReady = availableStock >= totalNeeded;

                                if (!isReady) canAllocate = false;

                                return `
                                    <tr>
                                        <td><strong>${mat.name}</strong> (${mat.code})</td>
                                        <td><strong style="color:var(--primary);">${totalNeeded} ${mat.unit}</strong></td>
                                        <td><strong>${availableStock} ${mat.unit}</strong></td>
                                        <td>
                                            ${isReady ? `
                                                <span class="badge badge-success"><i data-lucide="check" style="width:12px;"></i> Sẵn Sàng</span>
                                            ` : `
                                                <span class="badge badge-danger"><i data-lucide="alert-triangle" style="width:12px;"></i> Thiếu ${Number((totalNeeded - availableStock).toFixed(2))} ${mat.unit}</span>
                                            `}
                                        </td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>

                <div style="border-top:1px solid var(--border-color); padding-top: 1rem; margin-top: 1rem;">
                    <div style="background: rgba(255,255,255,0.01); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; margin-bottom: 1rem;">
                        <span style="font-size:0.75rem; color:var(--text-muted); text-transform:uppercase; font-weight:600;">Thông tin bàn giao</span>
                        <div style="font-size:0.875rem; color:#fff; margin-top: 4px;">
                            ${canAllocate ? `
                                <span style="color:var(--success); font-weight:600;"><i data-lucide="check-circle" style="width:14px; vertical-align:middle;"></i> Tồn kho hoàn toàn đáp ứng!</span> Bạn có thể tiến hành giữ chỗ cấp phát vật tư để xếp lịch sản xuất.
                            ` : `

                        ` : `
                            <button class="btn btn-success" style="opacity: 0.5; cursor: not-allowed;" disabled><i data-lucide="external-link"></i> Cấp Phát Vật Tư & Đưa Sang Lịch</button>

                </div>

        function replenishStock() {
            // Simulating a fast replenishment of stock
            state.products.forEach(p => {
                if (p.is_material) {
                    p.stock += 1000;
                }
            });
            saveState();
            renderWorkOrders(document.getElementById('content-area'));
            alert("Đã bổ sung 1,000 đơn vị tồn kho cho tất cả các nguyên vật liệu để phục vụ demo!");
        }

        function allocateMaterialsAndMoveToScheduler() {
            // Update selected WOs to status 'Material_Allocated' and change the state
            selectedWorkOrders.forEach(woId => {
                const wo = state.workOrders.find(w => w.id === woId);
                
                // Deduct inventory dynamically
                const bom = getBOMForProduct(wo.product_id);
                if (bom) {
                    bom.steps.forEach(step => {
                        step.inputs.forEach(input => {
                            const neededQty = (input.qty / bom.output_qty) * wo.qty;
                            const mat = getProduct(input.product_id);
                            if (mat) mat.stock = Number((mat.stock - neededQty).toFixed(2));
                        });
                    });
                }
                
                if (wo.status === 'Draft') {
                    wo.status = 'Material_Allocated';
                }
            });

            selectedWorkOrders = [];
            saveState();
            switchTab('schedule');
        }


        // ==================== TAB 6: SCHEDULING BOARD (GANTT) ====================
        function renderSchedule(container) {
            // Get WOs waiting to be scheduled (Material_Allocated)
            const backlogWOs = state.workOrders.filter(w => w.status === 'Material_Allocated');

            let html = `
                <div class="schedule-layout fade-in">
                    <!-- LEFT COLUMN: BACKLOG WOs WAITING FOR SCHEDULE -->
                    <div class="schedule-backlog">
                        <h4 style="font-size:0.9rem; font-weight:700; color:#fff; border-bottom:1px solid var(--border-color); padding-bottom:8px;"><i data-lucide="layers" style="width:16px;"></i> Hàng Chờ Xếp Lịch</h4>
                        <span style="font-size:0.75rem; color:var(--text-muted);">Kéo thẻ hoặc Click xếp lịch mẻ vào Tổ máy</span>
                        
                        ${backlogWOs.map(wo => {
                            const prod = getProduct(wo.product_id);
                            const bom = getBOMForProduct(wo.product_id);
                            const stepsCount = bom ? bom.steps.length : 1;
                            
                            return `
                                <div class="backlog-item" draggable="true" ondragstart="handleDragStart(event, ${wo.id})">
                                    <div class="flex justify-between" style="font-size:0.75rem; margin-bottom: 4px;">
                                        <span class="badge badge-info">${wo.number}</span>
                                        <strong>${wo.qty} ${prod.unit}</strong>
                                    </div>
                                    <div style="font-size: 0.85rem; font-weight: 600; color: #fff; margin-bottom:6px;">${prod.name}</div>
                                    <div class="flex justify-between align-center" style="font-size: 0.7rem; color:var(--text-muted);">
                                        <span>${stepsCount} bước quy trình</span>
                                        <button class="btn btn-primary" style="padding: 2px 6px; font-size:0.65rem; border-radius:4px;" onclick="quickScheduleWO(${wo.id})">Xếp nhanh</button>
                                    </div>
                                </div>
                            `;
                        }).join('')}

                        ${backlogWOs.length === 0 ? `
                            <div style="text-align:center; color:var(--text-muted); font-size:0.8rem; padding: 2rem 0; border: 1px dashed var(--border-color); border-radius:8px;">
                                Hàng chờ trống. Vui lòng cấp vật tư cho WO ở Tab trước.
                            </div>
                        ` : ''}
                    </div>

                    <!-- RIGHT COLUMN: SCHEDULING CALENDAR BOARD -->
                    <div class="gantt-board">
                        <div class="gantt-header">
                            <div class="gantt-cell">Tổ Máy / Máy Móc</div>
                            <div class="gantt-cell">07:00</div>
                            <div class="gantt-cell">08:00</div>
                            <div class="gantt-cell">09:00</div>
                            <div class="gantt-cell">10:00</div>
                            <div class="gantt-cell">11:00</div>
                            <div class="gantt-cell">12:00</div>
                            <div class="gantt-cell">13:00</div>
                            <div class="gantt-cell">14:00</div>
                            <div class="gantt-cell">15:00</div>
                            <div class="gantt-cell">16:00</div>
                            <div class="gantt-cell">17:00</div>
                            <div class="gantt-cell">18:00</div>
                        </div>

                        <!-- Row 1: Line 1 -->
                        ${renderGanttRow('Dây Chuyền Trộn 1', 'Line-1')}
                        <!-- Row 2: Line 2 -->
                        ${renderGanttRow('Dây Chuyền Trộn 2', 'Line-2')}
                        <!-- Row 3: Line 3 -->
                        ${renderGanttRow('Dây Chuyền Đóng Gói', 'Line-3')}
                    </div>
                </div>
            `;
            container.innerHTML = html;
            setupDragAndDrop();
        }

        function renderGanttRow(lineName, lineId) {
            const rowSchedules = state.schedules.filter(s => s.line_id === lineId);

            return `
                <div class="gantt-row">
                    <div class="gantt-line-lbl">${lineName}</div>
                    <div class="gantt-dropzone" data-line-id="${lineId}">
                        ${Array.from({ length: 12 }).map((_, i) => `
                            <div class="gantt-slot" data-hour="${7 + i}" ondragover="handleDragOver(event)" ondrop="handleDrop(event, '${lineId}', ${7 + i})"></div>
                        `).join('')}

                        ${rowSchedules.map(sched => {
                            const wo = state.workOrders.find(w => w.id === sched.wo_id);
                            if (!wo) return '';
                            const prod = getProduct(wo.product_id);
                            
                            // Width & position calculations based on 12-column layout (7:00 to 18:00 represents 12 hours)
                            const startCol = sched.start_hour - 7;
                            const duration = sched.duration_hours;
                            
                            const leftPct = (startCol / 12) * 100;
                            const widthPct = (duration / 12) * 100;

                            return `
                                <div class="gantt-task-bar status-${wo.status.toLowerCase()}" 
                                     style="left: calc(${leftPct}% + 4px); width: calc(${widthPct}% - 8px);"
                                     onclick="openScheduleDetail(${sched.id})">
                                    <span class="gantt-task-name">${wo.number} | ${prod.name.slice(0, 15)}...</span>
                                    <span class="gantt-task-time">${sched.start_hour}:00 - ${sched.start_hour + duration}:00 (${wo.status})</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        // HTML5 Drag and Drop Handlers
        let draggedWOId = null;

        function handleDragStart(ev, woId) {
            draggedWOId = woId;
            ev.dataTransfer.setData("text/plain", woId);
        }

        function handleDragOver(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.add('drag-over');
        }

        function handleDrop(ev, lineId, hour) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            
            const woId = parseInt(ev.dataTransfer.getData("text/plain")) || draggedWOId;
            if (woId) {
                scheduleWOOnLine(woId, lineId, hour);
            }
        }

        function setupDragAndDrop() {
            document.querySelectorAll('.gantt-slot').forEach(slot => {
                slot.addEventListener('dragleave', (ev) => {
                    ev.currentTarget.classList.remove('drag-over');
                });
            });
        }

        function quickScheduleWO(woId) {
            // Find a free spot and schedule it
            // Let's schedule it on Line-1 at 08:00 by default for simplicity
            scheduleWOOnLine(woId, 'Line-1', 8);
        }

        function scheduleWOOnLine(woId, lineId, startHour) {
            const wo = state.workOrders.find(w => w.id === woId);
            if (!wo) return;

            // Calculate duration based on BOM times (convert minutes to hours, rounding up to min 1 hour)
            const bom = getBOMForProduct(wo.product_id);
            let totalMins = 0;
            if (bom) {
                bom.steps.forEach(s => {
                    totalMins += (s.wait_time + s.exec_time);
                });
            }
            const durationHours = Math.max(1, Math.ceil(totalMins / 60));

            // Create Schedule Record
            const schedule = {
                id: Date.now(),
                wo_id: woId,
                line_id: lineId,
                start_hour: startHour,
                duration_hours: durationHours,
                status: 'Scheduled'
            };
            state.schedules.push(schedule);

            // Change WO status to 'Scheduled'
            wo.status = 'Scheduled';

            saveState();
            renderCurrentTab();
        }

        function openScheduleDetail(scheduleId) {
            const sched = state.schedules.find(s => s.id === scheduleId);
            const wo = state.workOrders.find(w => w.id === sched.wo_id);
            const prod = getProduct(wo.product_id);

            const overlay = document.getElementById('modal-overlay');
            const modal = document.getElementById('modal');
            overlay.classList.add('show');

            let modalHtml = `
                <div class="modal-header">
                    <span class="modal-title">Chi Tiết Lịch Trình - Mẻ ${wo.number}</span>
                    <button class="btn-icon" onclick="closeModal()"><i data-lucide="x"></i></button>
                </div>
                <div class="modal-body">
                    <div style="background: rgba(255,255,255,0.02); border:1px solid var(--border-color); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem;">
                        <span style="font-size:0.75rem; text-transform:uppercase; color: var(--text-muted); font-weight:600;">Sản phẩm sản xuất</span>
                        <div style="font-size: 1.15rem; font-weight: 700; color: #fff; margin-top: 4px;">${prod.name}</div>
                        <div style="font-size:0.875rem; margin-top: 8px;">Mẻ số: <strong>Mẻ ${wo.batch_index}</strong> | Quy mô mẻ: <strong>${wo.qty} ${prod.unit}</strong></div>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Dây Chuyền Đã Phân Bổ</label>
                            <input type="text" readonly value="${sched.line_id === 'Line-1' ? 'Dây Chuyền Trộn 1' : sched.line_id === 'Line-2' ? 'Dây Chuyền Trộn 2' : 'Dây Chuyền Đóng Gói'}" style="opacity:0.75;">
                        </div>
                        <div class="form-group">
                            <label>Khung Thời Gian Vận Hành</label>
                            <input type="text" readonly value="${sched.start_hour}:00 - ${sched.start_hour + sched.duration_hours}:00 (Thời lượng: ${sched.duration_hours}h)" style="opacity:0.75;">
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 1rem;">
                        <label>Cập nhật trạng thái sản xuất thực tế</label>
                        <select id="m_sched_status" onchange="updateWOStatusFromSchedule(${sched.id}, this.value)">
                            <option value="Scheduled" ${wo.status === 'Scheduled' ? 'selected' : ''}>Đã xếp lịch (Chưa bắt đầu)</option>
                            <option value="In_Progress" ${wo.status === 'In_Progress' ? 'selected' : ''}>Đang chạy sản xuất</option>
                            <option value="Completed" ${wo.status === 'Completed' ? 'selected' : ''}>Đã hoàn thành mẻ</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline-danger" onclick="cancelSchedule(${sched.id})"><i data-lucide="calendar-x"></i> Hủy Xếp Lịch</button>
                    <button class="btn btn-outline" onclick="closeModal()">Đóng</button>
                </div>
            `;
            modal.innerHTML = modalHtml;
            lucide.createIcons();
        }

        function updateWOStatusFromSchedule(scheduleId, newStatus) {
            const sched = state.schedules.find(s => s.id === scheduleId);
            const wo = state.workOrders.find(w => w.id === sched.wo_id);
            if (wo && sched) {
                wo.status = newStatus;
                sched.status = newStatus;
                
                // If moving to In Progress, initialize step tracking
                if (newStatus === 'In_Progress') {
                    wo.current_step = 1;
                    
                    // Also move associated Production Order to In_Progress
                    const mo = state.productionOrders.find(m => m.id === wo.mo_id);
                    if (mo) mo.status = 'In_Progress';
                }

                if (newStatus === 'Completed') {
                    completeWO(wo.id);
                }

                saveState();
                closeModal();
                renderCurrentTab();
            }
        }

        function cancelSchedule(scheduleId) {
            if (confirm("Bạn có chắc chắn muốn hủy xếp lịch cho mẻ sản xuất này không?")) {
                const sched = state.schedules.find(s => s.id === scheduleId);
                const wo = state.workOrders.find(w => w.id === sched.wo_id);
                if (wo) {
                    wo.status = 'Material_Allocated';
                }
                
                state.schedules = state.schedules.filter(s => s.id !== scheduleId);
                saveState();
                closeModal();
                renderCurrentTab();
            }
        }


        // ==================== GENERAL MODAL HELPERS ====================
        function closeModal(event = null) {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.remove('show');
        }
    </script>
</body>
</html>
