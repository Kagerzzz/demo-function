  <script>
    (function() {
      const errors = [];
      const oldError = console.error;
      
      function renderError(msg) {
        let errDiv = document.getElementById('debug-err-console');
        if (!errDiv) {
          errDiv = document.createElement('div');
          errDiv.id = 'debug-err-console';
          errDiv.style.position = 'fixed';
          errDiv.style.bottom = '0';
          errDiv.style.left = '0';
          errDiv.style.width = '100%';
          errDiv.style.backgroundColor = '#fee2e2';
          errDiv.style.color = '#991b1b';
          errDiv.style.padding = '16px';
          errDiv.style.zIndex = '99999';
          errDiv.style.fontFamily = 'monospace';
          errDiv.style.fontSize = '14px';
          errDiv.style.borderTop = '3px solid #ef4444';
          errDiv.style.whiteSpace = 'pre-wrap';
          errDiv.style.maxHeight = '40vh';
          errDiv.style.overflow = 'auto';
          const target = document.body || document.documentElement;
          if (target) {
            target.appendChild(errDiv);
          }
        }
        errDiv.innerHTML += '<div style="margin-bottom: 8px;"><strong>Console Error:</strong> ' + msg + '</div>';
      }
      
      console.error = function() {
        oldError.apply(console, arguments);
        const msg = Array.from(arguments).map(arg => {
          if (arg && arg.stack) return arg.stack;
          if (typeof arg === 'object') return JSON.stringify(arg);
          return String(arg);
        }).join(' ');
        
        if (document.body) {
          renderError(msg);
        } else {
          errors.push(msg);
        }
      };
      
      window.onerror = function(message, source, lineno, colno, error) {
        console.error("Uncaught error: " + message + " at " + source + ":" + lineno + ":" + colno, error);
        return false;
      };
      
      window.addEventListener('DOMContentLoaded', function() {
        if (errors.length > 0) {
          errors.forEach(renderError);
        }
      });
    })();
  </script>

      const handleToggleCheckbox = (productId) => {
        if (modalCheckboxIds.includes(productId)) {
          setModalCheckboxIds(modalCheckboxIds.filter(id => id !== productId));
        } else {
          setModalCheckboxIds([...modalCheckboxIds, productId]);
        }
      };

      // Add a single product to label's productIds
      const handleAddSingle = (productId) => {
        if (!tempSelectedIds.includes(productId)) {
          setTempSelectedIds([...tempSelectedIds, productId]);
          // Remove from selection if checked
          setModalCheckboxIds(modalCheckboxIds.filter(id => id !== productId));
          showToast("Đã thêm sản phẩm vào nhãn!");
        }
      };

      // Remove a single product from label's productIds
      const handleRemoveSingle = (productId) => {
        setTempSelectedIds(tempSelectedIds.filter(id => id !== productId));
        // Remove from selection if checked
        setModalCheckboxIds(modalCheckboxIds.filter(id => id !== productId));
        showToast("Đã xóa sản phẩm khỏi nhãn!");
      };

      // Bulk add selected products from checkbox selection
      const handleBulkAdd = () => {
        if (modalCheckboxIds.length === 0) return;
        const newSelected = [...tempSelectedIds];
        modalCheckboxIds.forEach(id => {
          if (!newSelected.includes(id)) {
            newSelected.push(id);
          }
        });
        setTempSelectedIds(newSelected);
        setModalCheckboxIds([]); // Clear selections after action
        showToast(`Đã thêm ${modalCheckboxIds.length} sản phẩm thành công!`);
      };

      // Bulk remove selected products from checkbox selection
      const handleBulkRemove = () => {
        if (modalCheckboxIds.length === 0) return;
        setTempSelectedIds(tempSelectedIds.filter(id => !modalCheckboxIds.includes(id)));
        setModalCheckboxIds([]); // Clear selections after action
        showToast(`Đã xóa ${modalCheckboxIds.length} sản phẩm thành công!`);
      };

      // Filtered products list inside modal based on search, group, and sub-tab
      const filteredProducts = useMemo(() => {
        return MOCK_PRODUCTS.filter(p => {
          const isAdded = tempSelectedIds.includes(p.id);
          const matchesTab = modalSubTab === "added" ? isAdded : !isAdded;
          const matchesQuery = p.name.toLowerCase().includes(modalQuery.toLowerCase()) || 
                               p.code.toLowerCase().includes(modalQuery.toLowerCase());
          const matchesGroup = modalGroupFilter === "Tất cả nhóm sản phẩm" || p.group === modalGroupFilter;
          return matchesTab && matchesQuery && matchesGroup;
        });
      }, [modalQuery, modalGroupFilter, modalSubTab, tempSelectedIds]);

      // Check if all filtered products are currently checked in checkbox state
      const isAllFilteredChecked = useMemo(() => {
        if (filteredProducts.length === 0) return false;
        return filteredProducts.every(p => modalCheckboxIds.includes(p.id));
      }, [filteredProducts, modalCheckboxIds]);

      // Select / Deselect all currently filtered products in checkbox state
      const handleToggleAllFiltered = () => {
        const filteredIds = filteredProducts.map(p => p.id);
        if (isAllFilteredChecked) {
          // Deselect all filtered products from checked state
          setModalCheckboxIds(modalCheckboxIds.filter(id => !filteredIds.includes(id)));
        } else {
          // Select all filtered products
          const newChecked = [...modalCheckboxIds];
          filteredIds.forEach(id => {
            if (!newChecked.includes(id)) {
              newChecked.push(id);
            }
          });
          setModalCheckboxIds(newChecked);
        }
      };

      // Save changes and close modal
      const handleSaveProducts = () => {
        setLabels(labels.map(l => {
          if (l.id === activeLabel.id) {
            return { ...l, productIds: tempSelectedIds };
          }
          return l;
        }));
        setConfigModalView("table");
        showToast(`Cập nhật nhãn "${activeLabel.name}" thành công!`);
      };

      // Render product labels for main table row
      const renderProductLabels = (productIds) => {
        if (productIds.length === 0) {
          return <span className="sprod-chip sprod-chip--empty">Chưa có sản phẩm được chọn</span>;
        }

        const selectedProducts = productIds.map(id => MOCK_PRODUCTS.find(p => p.id === id)).filter(Boolean);
        const displayLimit = 2;
        const shown = selectedProducts.slice(0, displayLimit);
        const moreCount = selectedProducts.length - displayLimit;

        return (
          <div className="sprod-chips">
            {shown.map(p => (
              <span key={p.id} className="sprod-chip">{p.name}</span>
            ))}
            {moreCount > 0 ? (
              <span className="sprod-chip sprod-chip--more">+{moreCount}</span>
            ) : null}
          </div>
        );
      };

      return (
        <div className="sshell">
          <Sidebar active="storage" />
          
          <div className="sshell__main">
            <TopNav />
            
            <main className="sshell__work">
              {/* Breadcrumbs */}
              <div className="sphead" style={{ paddingBottom: "10px" }}>
                <div>
                  <h2 className="sphead__t">Kết nối giao hàng GHTK</h2>
                  <div className="sphead__crumbs">
                    <span>Tổng quan</span>
                    <i className="ph ph-caret-right" />
                    <span>Kho vận</span>
                    <i className="ph ph-caret-right" />
                    <span>Kết nối giao hàng</span>
                    <i className="ph ph-caret-right" />
                    <span>GHTK</span>
                    <i className="ph ph-caret-right" />
                    <b>Cấu hình nhãn sản phẩm</b>
                  </div>
                </div>
              </div>

              {/* GHTK Banner Card with 12px border radius */}
              <div className="card" style={{ marginBottom: "20px", borderRadius: "12px", overflow: "hidden" }}>
                <div className="sghtk-banner">
                  <div className="sghtk-logo">GHTK</div>
                  <div className="sghtk-banner__info">
                    <h3>Giao Hàng Tiết Kiệm (GHTK)</h3>
                    <p>Kết nối vận chuyển nhanh chóng, cập nhật trạng thái đơn hàng thời gian thực.</p>
                  </div>
                  <div style={{ marginLeft: "auto" }}>
                    <Status tone="green">Đang hoạt động</Status>
                  </div>
                </div>

                {/* Sub-Tabs under GHTK banner */}
                <div style={{ display: "flex", borderBottom: "1px solid var(--stroke-base)", padding: "0 20px", background: "#fff" }}>
                  <span 
                    style={{ 
                      padding: "14px 16px", 
                      fontSize: "14px", 
                      color: activeTab === "connect" ? "var(--brand-pink)" : "var(--fg-secondary)", 
                      borderBottom: activeTab === "connect" ? "2px solid var(--brand-pink)" : "2px solid transparent", 
                      cursor: "pointer", 
                      fontWeight: activeTab === "connect" ? "700" : "500",
                      display: "inline-flex",
                      alignItems: "center"
                    }}
                    onClick={() => setActiveTab("connect")}
                  >
                    <i className="ph ph-plugs" style={{ marginRight: "6px" }} />Kết nối
                  </span>
                  <span 
                    style={{ 
                      padding: "14px 16px", 
                      fontSize: "14px", 
                      color: activeTab === "config" ? "var(--brand-pink)" : "var(--fg-secondary)", 
                      borderBottom: activeTab === "config" ? "2px solid var(--brand-pink)" : "2px solid transparent", 
                      cursor: "pointer", 
                      fontWeight: activeTab === "config" ? "700" : "500",
                      display: "inline-flex",
                      alignItems: "center"
                    }}
                    onClick={() => setActiveTab("config")}
                  >
                    <i className="ph ph-sliders" style={{ marginRight: "6px" }} />Cấu hình
                  </span>
                </div>

                {/* Tab Content: Connection */}
                {activeTab === "connect" && (
                  <div style={{ padding: "20px", background: "#fff" }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "20px" }}>
                      <div className="slbl-field">
                        <div className="slbl-field__lbl" style={{ fontSize: "13px", color: "var(--fg-base)", marginBottom: "6px" }}>Mã cửa hàng tại GHTK <span className="t-required">*</span></div>
                        <label className="sfield" style={{ width: "100%" }}>
                          <input className="sfield__input" value="SBOX-88129" disabled style={{ color: "var(--fg-secondary)" }} />
                        </label>
                      </div>
                      <div className="slbl-field">
                        <div className="slbl-field__lbl" style={{ fontSize: "13px", color: "var(--fg-base)", marginBottom: "6px" }}>Token API kết nối <span className="t-required">*</span></div>
                        <label className="sfield" style={{ width: "100%" }}>
                          <input className="sfield__input" type="password" value="••••••••••••••••••••••••••••••••" disabled style={{ color: "var(--fg-secondary)" }} />
                        </label>
                      </div>
                    </div>
                    <div style={{ marginTop: "16px", display: "flex", gap: "10px" }}>
                      <Button variant="primary" icon="plugs" onClick={() => showToast("Kết nối GHTK hoạt động tốt!")}>Kiểm tra kết nối</Button>
                      <Button variant="outline" icon="copy" onClick={() => showToast("Đã sao chép Webhook!")}>Sao chép Webhook</Button>
                    </div>
                  </div>
                )}

                {/* Tab Content: Configuration (ON/OFF Toggle) */}
                {activeTab === "config" && (
                  <div style={{ padding: "20px", background: "#fff" }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                      <div>
                        <div style={{ fontWeight: "700", fontSize: "14px", color: "var(--fg-base)" }}>
                          Tự động gán nhãn đơn hàng theo sản phẩm
                        </div>
                        <div style={{ fontSize: "12px", color: "var(--fg-secondary)", marginTop: "4px" }}>
                          Hệ thống sẽ tự động thêm nhãn vận chuyển của GHTK vào đơn hàng tương ứng dựa trên cấu hình sản phẩm.
                        </div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                        <Button variant="outline" icon="tags" onClick={handleOpenConfigModal}>
                          Cấu hình nhãn
                        </Button>
                        <label className="sswitch">
                          <input 
                            type="checkbox" 
                            checked={autoAssignLabels} 
                            onChange={(e) => setAutoAssignLabels(e.target.checked)} 
                          />
                          <span className="sswitch__slider"></span>
                        </label>
                      </div>
                    </div>

                    {/* Divider and Info Tips (always shown) */}
                    <div style={{ marginTop: "20px", borderTop: "1px solid var(--stroke-base)", paddingTop: "20px" }}>
                      {/* Info Tips section inside the main config card */}
                      <div className="panel bg-muted" style={{ borderRadius: "8px", border: "1px dashed var(--stroke-medium)" }}>
                        <div style={{ display: "flex", gap: "10px", alignItems: "flex-start", fontSize: "13px" }}>
                          <i className="ph ph-info" style={{ color: "var(--color-blue)", fontSize: "18px", marginTop: "2px" }} />
                          <div>
                            <strong style={{ display: "block", marginBottom: "4px" }}>Hướng dẫn cấu hình nhãn GHTK:</strong>
                            <ul style={{ margin: 0, paddingLeft: "18px", lineHeight: "1.6", color: "var(--fg-base)" }}>
                              <li>Nhãn áp dụng cho sản phẩm sẽ được tự động gắn kèm khi tạo vận đơn gửi sang GHTK.</li>
                              <li>Nhấp chọn <strong>Cấu hình nhãn</strong> để thiết lập chi tiết sản phẩm áp dụng cho từng nhãn trong popup.</li>
                            </ul>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </main>
          </div>

          {/* CONFIGURATION & SELECTION MODAL */}
          <Modal
            open={configModalOpen}
            onClose={() => setConfigModalOpen(false)}
            title={
              configModalView === "table" ? (
                "Cấu hình nhãn theo sản phẩm GHTK"
              ) : (
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                    <button 
                      className="sbtn sbtn--ghost sbtn--icon" 
                      style={{ width: "32px", height: "32px", borderRadius: "50%", padding: 0 }}
                      onClick={() => setConfigModalView("table")}
                    >
                      <i className="ph ph-arrow-left" style={{ fontSize: "18px" }} />
                    </button>
                    <span>Chọn sản phẩm áp dụng nhãn</span>
                  </div>
                  {activeLabel && (
                    <div style={{ fontSize: "12px", color: "var(--fg-secondary)", fontWeight: "500", marginTop: "2px", marginLeft: "40px" }}>
                      Nhãn: <span style={{ color: "var(--brand-pink)", fontWeight: "700" }}>{activeLabel.name}</span>
                    </div>
                  )}
                </div>
              )
            }
            width={configModalView === "table" ? 980 : 880}
            footer={
              configModalView === "table" ? (
                <>
                  <Button variant="primary" icon="check" onClick={() => { setConfigModalOpen(false); showToast("Đã lưu toàn bộ cấu hình nhãn!"); }}>Hoàn tất</Button>
                </>
              ) : (
                <>
                  <Button variant="outline" onClick={() => setConfigModalView("table")}>Quay lại</Button>
                  <Button variant="primary" icon="floppy-disk" onClick={handleSaveProducts}>Xác nhận chọn</Button>
                </>
              )
            }
          >
            {configModalView === "table" ? (
              /* VIEW 1: Labels Table */
              <div style={{ padding: "0" }}>
                <table className="stable">
                  <thead>
                    <tr>
                      <th style={{ width: 80, textAlign: "center" }}>STT</th>
                      <th style={{ width: 260 }}>Tên nhãn</th>
                      <th>Sản phẩm áp dụng</th>
                      <th style={{ width: 180, textAlign: "right" }}>Thao tác</th>
                    </tr>
                  </thead>
                  <tbody>
                    {labels.map((lbl, idx) => (
                      <tr key={lbl.id}>
                        <td style={{ textAlign: "center", color: "var(--fg-secondary)", fontWeight: "500" }}>{idx + 1}</td>
                        <td>
                          <div style={{ fontWeight: "700", color: "var(--fg-base)" }}>{lbl.name}</div>
                        </td>
                        <td>
                          {renderProductLabels(lbl.productIds)}
                        </td>
                        <td style={{ textAlign: "right" }}>
                          <Button variant="outline" icon="pencil-simple" onClick={() => handleOpenProductSelect(lbl)}>
                            Thay đổi sản phẩm
                          </Button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ) : (
              /* VIEW 2: Product Grid Selection */
              <div>
                {/* Switch button with 2 tabs: Đã thêm & Chưa thêm */}
                <div style={{ display: "flex", gap: "2px", background: "var(--stroke-base)", padding: "3px", borderRadius: "8px", marginBottom: "14px" }}>
                  <button 
                    type="button"
                    className="sbtn" 
                    style={{ 
                      flex: 1, 
                      height: "36px", 
                      background: modalSubTab === "added" ? "#fff" : "transparent", 
                      boxShadow: modalSubTab === "added" ? "var(--shadow-card)" : "none",
                      color: modalSubTab === "added" ? "var(--brand-pink)" : "var(--fg-base)",
                      fontWeight: modalSubTab === "added" ? "700" : "500",
                      borderRadius: "6px",
                      border: "none",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      gap: "6px"
                    }}
                    onClick={() => { setModalSubTab("added"); setModalCheckboxIds([]); }}
                  >
                    <i className="ph ph-circle-check-fill" style={{ fontSize: "16px", color: modalSubTab === "added" ? "var(--brand-pink)" : "var(--fg-secondary)" }} />
                    Đã thêm ({tempSelectedIds.length})
                  </button>
                  <button 
                    type="button"
                    className="sbtn" 
                    style={{ 
                      flex: 1, 
                      height: "36px", 
                      background: modalSubTab === "not_added" ? "#fff" : "transparent", 
                      boxShadow: modalSubTab === "not_added" ? "var(--shadow-card)" : "none",
                      color: modalSubTab === "not_added" ? "var(--brand-pink)" : "var(--fg-base)",
                      fontWeight: modalSubTab === "not_added" ? "700" : "500",
                      borderRadius: "6px",
                      border: "none",
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      gap: "6px"
                    }}
                    onClick={() => { setModalSubTab("not_added"); setModalCheckboxIds([]); }}
                  >
                    <i className="ph ph-plus-circle-fill" style={{ fontSize: "16px", color: modalSubTab === "not_added" ? "var(--brand-pink)" : "var(--fg-secondary)" }} />
                    Chưa thêm ({MOCK_PRODUCTS.length - tempSelectedIds.length})
                  </button>
                </div>

                {/* Filter controls inside modal */}
                <div className="smodal-filter-bar">
                  <Field
                    icon="magnifying-glass"
                    placeholder="Tìm theo tên / mã sản phẩm"
                    value={modalQuery}
                    onChange={setModalQuery}
                    width={320}
                  />
                  <select
                    className="sselect"
                    value={modalGroupFilter}
                    onChange={(e) => setModalGroupFilter(e.target.value)}
                    style={{ flex: 1 }}
                  >
                    {PRODUCT_GROUPS.map(g => (
                      <option key={g} value={g}>{g}</option>
                    ))}
                  </select>
                </div>

                {/* Selection Summary & Bulk Action */}
                <div style={{ marginBottom: "12px", fontSize: "13px", display: "flex", justifyContent: "space-between", alignItems: "center", height: "36px" }}>
                  <span style={{ color: "var(--fg-secondary)" }}>
                    Đang hiển thị: <b>{filteredProducts.length}</b> sản phẩm
                  </span>
                  
                  {modalCheckboxIds.length > 0 ? (
                    <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
                      <span style={{ fontSize: "12px", color: "var(--fg-secondary)" }}>
                        Đã tích chọn <b>{modalCheckboxIds.length}</b> sản phẩm
                      </span>
                      {modalSubTab === "not_added" ? (
                        <button 
                          type="button" 
                          className="sbtn sbtn--primary" 
                          onClick={handleBulkAdd} 
                          style={{ height: "30px", fontSize: "12px", padding: "0 12px" }}
                        >
                          <i className="ph ph-plus" style={{ marginRight: "4px" }} />Thêm đã chọn
                        </button>
                      ) : (
                        <button 
                          type="button" 
                          className="sbtn sbtn--outline" 
                          onClick={handleBulkRemove} 
                          style={{ height: "30px", fontSize: "12px", padding: "0 12px", color: "var(--color-red)", borderColor: "var(--color-red)" }}
                        >
                          <i className="ph ph-trash" style={{ marginRight: "4px" }} />Xóa đã chọn
                        </button>
                      )}
                    </div>
                  ) : (
                    <span style={{ color: "var(--fg-secondary)" }}>
                      Tích chọn nhiều sản phẩm để thao tác hàng loạt
                    </span>
                  )}
                </div>

                {/* Products Table */}
                <div className="card" style={{ maxHeight: "350px", overflowY: "auto" }}>
                  <table className="stable stable--mkt" style={{ width: "100%" }}>
                    <thead>
                      <tr>
                        <th style={{ width: 40, textAlign: "center" }}>
                          <Checkbox 
                            checked={isAllFilteredChecked} 
                            onChange={handleToggleAllFiltered}
                          />
                        </th>
                        <th style={{ width: 50, textAlign: "center" }}>STT</th>
                        <th style={{ width: 60, textAlign: "center" }}>Ảnh</th>
                        <th style={{ width: 90 }}>Mã SP</th>
                        <th>Tên sản phẩm</th>
                        <th style={{ width: 180 }}>Nhóm sản phẩm</th>
                        <th style={{ width: 120, textAlign: "right" }}>Thao tác</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredProducts.map((prod, index) => {
                        const isChecked = modalCheckboxIds.includes(prod.id);
                        return (
                          <tr 
                            key={prod.id} 
                            style={{ cursor: "pointer", background: isChecked ? "var(--surface-pink)" : "transparent" }}
                            onClick={() => handleToggleCheckbox(prod.id)}
                          >
                            <td style={{ textAlign: "center" }} onClick={(e) => e.stopPropagation()}>
                              <Checkbox 
                                checked={isChecked} 
                                onChange={() => handleToggleCheckbox(prod.id)}
                              />
                            </td>
                            <td style={{ textAlign: "center", color: "var(--fg-secondary)" }}>{index + 1}</td>
                            <td style={{ display: "flex", justifyContent: "center" }}>
                              <div className="sprod-thumb">
                                <i className="ph ph-package" />
                              </div>
                            </td>
                            <td className="t-mono">{prod.code}</td>
                            <td>
                              <b style={{ color: "var(--fg-base)" }}>{prod.name}</b>
                            </td>
                            <td>
                              <span style={{ fontSize: "12px", color: "var(--fg-secondary)" }}>{prod.group}</span>
                            </td>
                            <td style={{ textAlign: "right" }} onClick={(e) => e.stopPropagation()}>
                              {modalSubTab === "not_added" ? (
                                <button 
                                  type="button" 
                                  className="sbtn sbtn--ghost" 
                                  style={{ height: "30px", padding: "0 10px", fontSize: "12px", color: "var(--color-green)" }}
                                  onClick={() => handleAddSingle(prod.id)}
                                >
                                  <i className="ph ph-plus" style={{ marginRight: "4px" }} />Thêm
                                </button>
                              ) : (
                                <button 
                                  type="button" 
                                  className="sbtn sbtn--ghost" 
                                  style={{ height: "30px", padding: "0 10px", fontSize: "12px", color: "var(--color-red)" }}
                                  onClick={() => handleRemoveSingle(prod.id)}
                                >
                                  <i className="ph ph-trash" style={{ marginRight: "4px" }} />Xóa
                                </button>
                              )}
                            </td>
                          </tr>
                        );
                      })}
                      {filteredProducts.length === 0 ? (
                        <tr>
                          <td colSpan={7} style={{ padding: "40px 0" }}>
                            <div style={{ textAlign: "center", color: "var(--fg-secondary)" }}>
                              <i className="ph ph-magnifying-glass" style={{ fontSize: "32px", marginBottom: "8px", display: "block" }} />
                              Không tìm thấy sản phẩm phù hợp bộ lọc
                            </div>
                          </td>
                        </tr>
                      ) : null}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </Modal>

          {/* TOAST NOTIFICATION */}
          {toastMsg ? (
            <div className="stoast">
              <i className="ph ph-circle-check-fill" />
              <span>{toastMsg}</span>
            </div>
          ) : null}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("app"));
    root.render(<App />);
  </script>
</body>
</html>
