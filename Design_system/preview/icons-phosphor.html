<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Iconography — Phosphor" subtitle="Line system for all UI affordances" viewport="700x230" -->
<html lang="en">
<head><meta charset="utf-8"><title>Phosphor</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  html, body { margin: 0; padding: 22px; background: #fff; }
  .head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 14px; }
  .head .name { font-size: 18px; font-weight: 700; }
  .head .meta { font-size: 12px; color: var(--fg-secondary); }
  .grid { display: grid; grid-template-columns: repeat(14, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .cell i.ph { font-size: 22px; color: var(--fg-base); }
  .cell span { font-size: 9px; color: var(--fg-secondary); }
</style></head>
<body>
  <div class="head">
    <div class="name">Phosphor</div>
    <div class="meta">Regular weight · 20 px default · <code>currentColor</code></div>
  </div>
  <div class="grid">
    <div class="cell"><i class="ph ph-magnifying-glass"></i></div>
    <div class="cell"><i class="ph ph-plus"></i></div>
    <div class="cell"><i class="ph ph-x"></i></div>
    <div class="cell"><i class="ph ph-pencil-simple"></i></div>
    <div class="cell"><i class="ph ph-trash"></i></div>
    <div class="cell"><i class="ph ph-copy"></i></div>
    <div class="cell"><i class="ph ph-caret-down"></i></div>
    <div class="cell"><i class="ph ph-caret-up"></i></div>
    <div class="cell"><i class="ph ph-caret-left"></i></div>
    <div class="cell"><i class="ph ph-caret-right"></i></div>
    <div class="cell"><i class="ph ph-arrow-clockwise"></i></div>
    <div class="cell"><i class="ph ph-funnel"></i></div>
    <div class="cell"><i class="ph ph-sort-ascending"></i></div>
    <div class="cell"><i class="ph ph-export"></i></div>
    <div class="cell"><i class="ph ph-bell"></i></div>
    <div class="cell"><i class="ph ph-user"></i></div>
    <div class="cell"><i class="ph ph-users-three"></i></div>
    <div class="cell"><i class="ph ph-calendar"></i></div>
    <div class="cell"><i class="ph ph-clock"></i></div>
    <div class="cell"><i class="ph ph-house"></i></div>
    <div class="cell"><i class="ph ph-storefront"></i></div>
    <div class="cell"><i class="ph ph-shopping-cart"></i></div>
    <div class="cell"><i class="ph ph-money"></i></div>
    <div class="cell"><i class="ph ph-receipt"></i></div>
    <div class="cell"><i class="ph ph-package"></i></div>
    <div class="cell"><i class="ph ph-envelope"></i></div>
    <div class="cell"><i class="ph ph-phone"></i></div>
    <div class="cell"><i class="ph ph-chat-circle"></i></div>
    <div class="cell"><i class="ph ph-check"></i></div>
    <div class="cell"><i class="ph ph-check-circle"></i></div>
    <div class="cell"><i class="ph ph-warning"></i></div>
    <div class="cell"><i class="ph ph-info"></i></div>
    <div class="cell"><i class="ph ph-paperclip"></i></div>
    <div class="cell"><i class="ph ph-tag"></i></div>
    <div class="cell"><i class="ph ph-globe"></i></div>
    <div class="cell"><i class="ph ph-gear"></i></div>
    <div class="cell"><i class="ph ph-rocket-launch"></i></div>
    <div class="cell"><i class="ph ph-list"></i></div>
    <div class="cell"><i class="ph ph-eye"></i></div>
    <div class="cell"><i class="ph ph-eye-slash"></i></div>
    <div class="cell"><i class="ph ph-dots-three"></i></div>
    <div class="cell"><i class="ph ph-dots-three-vertical"></i></div>
  </div>
</body></html>
