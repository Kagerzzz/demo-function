<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Brand strap" subtitle="140 px gradient page header" viewport="700x200" -->
<html lang="en">
<head><meta charset="utf-8"><title>Brand strap</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 22px; background: #fff; }
  .strap { height: 140px; background: var(--brand-gradient-h); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-radius: 4px; }
  .strap img { height: 60px; width: auto; }
  .title { color: #fff; text-align: right; }
  .title .t { font-size: 32px; font-weight: 800; line-height: 1; }
  .title .s { font-size: 22px; font-weight: 500; line-height: 1; margin-top: 6px; opacity: 0.95; }
  .label { font-size: 11px; color: var(--fg-secondary); font-family: ui-monospace, monospace; margin-top: 8px; text-align: center; }
</style></head>
<body>
  <div class="strap">
    <img src="../assets/logo-white.png" alt="SandBox">
    <div class="title">
      <div class="t">Khách hàng</div>
      <div class="s">SandboxVN</div>
    </div>
  </div>
  <div class="label">140 px tall · brand gradient · white logo left, page title right</div>
</body></html>
