<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation" subtitle="Flat → card → popover → modal" viewport="700x200" -->
<html lang="en">
<head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 22px; background: #dce5ee; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .cell { background: #fff; border-radius: 8px; padding: 18px 16px; min-height: 110px; display: flex; flex-direction: column; justify-content: space-between; }
  .none { box-shadow: none; border: 1px solid #f0f0f0; }
  .card { box-shadow: 0 1px 2px rgba(58,58,76,0.06); }
  .popover { box-shadow: 0 8px 24px rgba(58,58,76,0.12); }
  .modal { box-shadow: 0 16px 48px rgba(58,58,76,0.18); }
  .name { font-weight: 700; font-size: 13px; }
  .meta { font-size: 11px; color: var(--fg-secondary); font-family: ui-monospace, monospace; line-height: 1.5; }
</style></head>
<body>
  <div class="row">
    <div class="cell none">
      <div class="name">flat / hairline</div>
      <div class="meta">1px solid #f0f0f0<br>default</div>
    </div>
    <div class="cell card">
      <div class="name">card</div>
      <div class="meta">0 1 2 / 6%<br>raised panel</div>
    </div>
    <div class="cell popover">
      <div class="name">popover</div>
      <div class="meta">0 8 24 / 12%<br>dropdown · menu</div>
    </div>
    <div class="cell modal">
      <div class="name">modal</div>
      <div class="meta">0 16 48 / 18%<br>dialog · sheet</div>
    </div>
  </div>
</body></html>
