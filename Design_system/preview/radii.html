<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Border radii" subtitle="2 · 4 · 5 · 8 · 20 · full" viewport="700x170" -->
<html lang="en">
<head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 18px 22px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 56px; background: var(--brand-gradient-h); }
  .name { font-weight: 700; font-size: 12px; }
  .meta { font-size: 11px; color: var(--fg-secondary); font-family: ui-monospace, monospace; text-align: center; line-height: 1.4; }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="box" style="border-radius:2px"></div><div class="name">2 px</div><div class="meta">outer frame</div></div>
    <div class="cell"><div class="box" style="border-radius:4px"></div><div class="name">4 px</div><div class="meta">chips · status</div></div>
    <div class="cell"><div class="box" style="border-radius:5px"></div><div class="name">5 px</div><div class="meta">card · popover</div></div>
    <div class="cell"><div class="box" style="border-radius:8px"></div><div class="name">8 px</div><div class="meta">button · field</div></div>
    <div class="cell"><div class="box" style="border-radius:20px"></div><div class="name">20 px</div><div class="meta">avatar (40px)</div></div>
    <div class="cell"><div class="box" style="border-radius:999px"></div><div class="name">full</div><div class="meta">pill · dot</div></div>
  </div>
</body></html>
