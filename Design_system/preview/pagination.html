<!DOCTYPE html>
<!-- @dsCard group="Components" name="Pagination" subtitle="Info · pills · per-page" viewport="700x130" -->
<html lang="en">
<head><meta charset="utf-8"><title>Pagination</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  html, body { margin: 0; padding: 24px; background: #fff; }
  .pager { display: inline-flex; align-items: center; gap: 32px; font-size: 14px; color: var(--fg-base); font-weight: 500; }
  .pager-info { letter-spacing: 0.005em; }
  .controls { display: inline-flex; align-items: center; gap: 10px; }
  .btn-arrow, .num { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--stroke-medium); border-radius: 999px; background: #fff; color: var(--fg-secondary); cursor: pointer; font-size: 13px; }
  .num.active { background: var(--brand-gradient-h); border-color: transparent; color: #fff; }
  .num.dots { border: 0; }
  .perpage { display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 12px; border: 1px solid var(--stroke-base); border-radius: 6px; color: var(--fg-base); font-size: 14px; cursor: pointer; }
  i.ph { font-size: 16px; }
</style></head>
<body>
  <div class="pager">
    <div class="pager-info">1 - 10 of 250 items</div>
    <div class="controls">
      <button class="btn-arrow"><i class="ph ph-caret-left"></i></button>
      <span class="num active">1</span>
      <span class="num">2</span>
      <span class="num">3</span>
      <span class="num">4</span>
      <span class="num">5</span>
      <span class="num dots">…</span>
      <span class="num">12</span>
      <button class="btn-arrow"><i class="ph ph-caret-right"></i></button>
    </div>
    <span class="perpage">10 / trang <i class="ph ph-caret-down"></i></span>
  </div>
</body></html>
