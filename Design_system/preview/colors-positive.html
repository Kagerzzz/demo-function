<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Positive accents" subtitle="Purple · teal · blue · green" viewport="700x160" -->
<html lang="en">
<head><meta charset="utf-8"><title>Positive accents</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 16px 20px; }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .cell { display: flex; flex-direction: column; gap: 4px; }
  .pair { display: flex; height: 60px; border-radius: 6px; overflow: hidden; border: 1px solid var(--stroke-base); }
  .pair > div { flex: 1; }
  .name { font-weight: 700; font-size: 12px; }
  .meta { font-size: 11px; color: var(--fg-secondary); font-family: ui-monospace, monospace; line-height: 1.4; }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="pair"><div style="background:#ad56f4"></div><div style="background:#e6e5ff"></div></div><div class="name">Purple</div><div class="meta">#ad56f4 / #e6e5ff</div></div>
    <div class="cell"><div class="pair"><div style="background:#00aed0"></div><div style="background:#ddfbfb"></div></div><div class="name">Blue-2</div><div class="meta">#00aed0 / #ddfbfb</div></div>
    <div class="cell"><div class="pair"><div style="background:#16c3c3"></div><div style="background:#ddfbfb"></div></div><div class="name">Blear</div><div class="meta">#16c3c3 / #ddfbfb</div></div>
    <div class="cell"><div class="pair"><div style="background:#0069e1"></div><div style="background:#e7f5ff"></div></div><div class="name">Blue</div><div class="meta">#0069e1 / #e7f5ff</div></div>
    <div class="cell"><div class="pair"><div style="background:#068b00"></div><div style="background:#e6ffea"></div></div><div class="name">Green</div><div class="meta">#068b00 / #e6ffea</div></div>
    <div class="cell"><div class="pair"><div style="background:#b20089"></div><div style="background:#ffe1f8"></div></div><div class="name">Dark-purple</div><div class="meta">#b20089 / #ffe1f8</div></div>
  </div>
</body></html>
