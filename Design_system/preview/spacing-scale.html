<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4 px base unit · 4–64 px" viewport="700x320" -->
<html lang="en">
<head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 18px 22px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
  .label { width: 100px; font-family: ui-monospace, monospace; font-size: 12px; color: var(--fg-base); }
  .bar { height: 16px; background: var(--brand-gradient-h); border-radius: 2px; }
  .px { color: var(--fg-secondary); font-size: 12px; font-family: ui-monospace, monospace; }
</style></head>
<body>
  <div class="row"><div class="label">space-1</div><div class="bar" style="width:4px"></div><div class="px">4 px</div></div>
  <div class="row"><div class="label">space-2</div><div class="bar" style="width:8px"></div><div class="px">8 px</div></div>
  <div class="row"><div class="label">space-3</div><div class="bar" style="width:12px"></div><div class="px">12 px</div></div>
  <div class="row"><div class="label">space-4</div><div class="bar" style="width:16px"></div><div class="px">16 px</div></div>
  <div class="row"><div class="label">space-5</div><div class="bar" style="width:20px"></div><div class="px">20 px</div></div>
  <div class="row"><div class="label">space-6</div><div class="bar" style="width:24px"></div><div class="px">24 px</div></div>
  <div class="row"><div class="label">space-8</div><div class="bar" style="width:32px"></div><div class="px">32 px</div></div>
  <div class="row"><div class="label">space-10</div><div class="bar" style="width:40px"></div><div class="px">40 px</div></div>
  <div class="row"><div class="label">space-12</div><div class="bar" style="width:48px"></div><div class="px">48 px</div></div>
  <div class="row"><div class="label">space-16</div><div class="bar" style="width:64px"></div><div class="px">64 px</div></div>
</body></html>
