<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Iconography — modules" subtitle="13 bespoke 3D module illustrations" viewport="700x180" -->
<html lang="en">
<head><meta charset="utf-8"><title>Module illustrations</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 22px; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 8px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px; }
  .cell img { width: 44px; height: 44px; object-fit: contain; }
  .cell span { font-size: 10px; color: var(--fg-base); text-align: center; font-weight: 500; }
  .head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 14px; }
  .head .name { font-size: 18px; font-weight: 700; }
  .head .meta { font-size: 12px; color: var(--fg-secondary); }
</style></head>
<body>
  <div class="head">
    <div class="name">3D module illustrations</div>
    <div class="meta">Bespoke PNGs · saturated · soft pink highlights · sidebar &amp; feature splashes only</div>
  </div>
  <div class="grid">
    <div class="cell"><img src="../assets/modules/marketing.png"><span>Marketing</span></div>
    <div class="cell"><img src="../assets/modules/sales.png"><span>Sales</span></div>
    <div class="cell"><img src="../assets/modules/storage.png"><span>Kho vận</span></div>
    <div class="cell"><img src="../assets/modules/buy.png"><span>Mua hàng</span></div>
    <div class="cell"><img src="../assets/modules/account.png"><span>Kế toán</span></div>
    <div class="cell"><img src="../assets/modules/cash.png"><span>Cửa hàng</span></div>
    <div class="cell"><img src="../assets/modules/job.png"><span>Công việc</span></div>
    <div class="cell"><img src="../assets/modules/customer.png"><span>Khách hàng</span></div>
    <div class="cell"><img src="../assets/modules/employee.png"><span>Nhân sự</span></div>
    <div class="cell"><img src="../assets/modules/report.png"><span>Báo cáo</span></div>
    <div class="cell"><img src="../assets/modules/utilities.png"><span>Tiện ích</span></div>
    <div class="cell"><img src="../assets/modules/setting.png"><span>Cài đặt</span></div>
    <div class="cell"><img src="../assets/modules/system.png"><span>Hệ thống</span></div>
  </div>
</body></html>
