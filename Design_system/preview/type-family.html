<!DOCTYPE html>
<!-- @dsCard group="Type" name="Typeface" subtitle="Inter — five weights" viewport="700x220" -->
<html lang="en">
<head><meta charset="utf-8"><title>Inter</title>
<link rel="stylesheet" href="_base.css">
<style>
  body { padding: 20px 24px; }
  .specimen { display: flex; flex-direction: column; gap: 6px; }
  .display { font-size: 88px; font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
  .meta { display: flex; gap: 18px; color: var(--fg-secondary); font-size: 12px; }
  .meta b { color: var(--fg-base); font-weight: 600; }
  .weights { display: flex; gap: 14px; align-items: baseline; margin-top: 4px; }
  .weights span { font-size: 18px; }
</style></head>
<body>
  <div class="specimen">
    <div class="display">Inter</div>
    <div class="meta">
      <span><b>Sans-serif</b> · Variable</span>
      <span><b>Weights</b> 400 · 500 · 600 · 700 · 800</span>
      <span><b>Tracking</b> 0.005em</span>
    </div>
    <div class="weights">
      <span style="font-weight:400">Regular</span>
      <span style="font-weight:500">Medium</span>
      <span style="font-weight:600">SemiBold</span>
      <span style="font-weight:700">Bold</span>
      <span style="font-weight:800">ExtraBold</span>
    </div>
  </div>
</body></html>
